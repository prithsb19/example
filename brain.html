<!DOCTYPE html>
<html>
<head>
  <title>Mind</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: sans-serif;
    }

    .node {
      position: absolute;
      padding: 14px 22px;
      border-radius: 50px;
      background: rgba(255,255,255,0.1);
      color: white;
      text-decoration: none;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s ease;
    }

    .node:hover {
      transform: scale(1.2);
      background: white;
      color: black;
    }

    /* Floating animation */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .float {
      animation: float 4s ease-in-out infinite;
    }

    /* Glow dots (background brain feel) */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,0.15), transparent);
      border-radius: 50%;
      filter: blur(80px);
    }

  </style>
</head>

<body>

  <!-- Background glow -->
  <div class="glow" style="top:20%; left:30%;"></div>
  <div class="glow" style="top:60%; left:60%;"></div>

  <!-- Nodes -->
  <a href="start.html" class="node float" style="top:45%; left:45%;">Start</a>

  <a href="love.html" class="node float" style="top:20%; left:70%; animation-delay:1s;">
    How I loved you
  </a>

  <a href="unsaid.html" class="node float" style="top:70%; left:65%; animation-delay:2s;">
    What I didn’t say well
  </a>

  <a href="real.html" class="node float" style="top:25%; left:20%; animation-delay:1.5s;">
    What was real
  </a>

</body>
</html>
