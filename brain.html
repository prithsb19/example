<!DOCTYPE html>
<html>
<head>
  <title>Mind</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: -apple-system, sans-serif;
    }

    /* Background gradient pulse */
    .bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(255,255,255,0.08), black 70%);
      animation: breathe 8s ease-in-out infinite;
    }

    @keyframes breathe {
      0%,100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    /* Nodes */
    .node {
      position: absolute;
      padding: 14px 24px;
      border-radius: 50px;
      background: rgba(255,255,255,0.08);
      color: white;
      text-decoration: none;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.4s ease;
    }

    .node:hover {
      transform: scale(1.3);
      background: white;
      color: black;
      box-shadow: 0 0 30px rgba(255,255,255,0.6);
    }

    /* Floating motion */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    .float {
      animation: float 6s ease-in-out infinite;
    }

  </style>
</head>

<body>

<div class="bg"></div>

<a href="start.html" class="node float" style="top:50%; left:45%;">
  Start
</a>

<a href="love.html" class="node float" style="top:20%; left:70%; animation-delay:1s;">
  How I loved you
</a>

<a href="unsaid.html" class="node float" style="top:70%; left:65%; animation-delay:2s;">
  What I didn’t say well
</a>

<a href="real.html" class="node float" style="top:25%; left:20%; animation-delay:1.5s;">
  What was real
</a>

</body>
</html>
